services:
  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  docchat:
    build: .
    ports:
      - "7860:7860"
    environment:
      - DOCCHAT_OLLAMA_URL=http://ollama:11434/api/generate
    depends_on:
      - ollama

volumes:
  ollama_data: